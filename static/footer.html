<footer style="background: var(--bg-card); border-top: 1px solid var(--border); padding: 2rem 1rem; text-align: center; color: var(--text-secondary); margin-top: 3rem;">
  <div style="max-width: 1200px; margin: 0 auto;">
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; margin-bottom: 1.5rem;">
      <a href="https://github.com/raccommode/P-StreamRec" target="_blank" style="color: var(--text-secondary); text-decoration: none; transition: color 0.2s;">
        <span style="font-size: 1.25rem;">📦</span> GitHub
      </a>
      <a href="https://github.com/raccommode/P-StreamRec/issues" target="_blank" style="color: var(--text-secondary); text-decoration: none; transition: color 0.2s;">
        <span style="font-size: 1.25rem;">🐛</span> Report Issue
      </a>
      <a href="https://github.com/raccommode/P-StreamRec#readme" target="_blank" style="color: var(--text-secondary); text-decoration: none; transition: color 0.2s;">
        <span style="font-size: 1.25rem;">📖</span> Documentation
      </a>
    </div>
    <div style="font-size: 0.875rem; opacity: 0.7;">
      <p style="margin: 0.5rem 0;">Made with ❤️ for stream recording</p>
      <p style="margin: 0.5rem 0; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
        <span style="display: inline-flex; align-items: center; gap: 0.25rem;">
          <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse-dot 2s ease-in-out infinite;"></span>
          <strong id="activeInstances" style="color: var(--primary);">-</strong>
        </span>
        <span>instances actives dans le monde</span>
      </p>
    </div>
  </div>
</footer>

<style>
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>

<script>
  // Load version in footer
  (async function() {
    try {
      const res = await fetch('/api/version');
      const data = await res.json();
      const footerVersion = document.getElementById('footerVersion');
      if (footerVersion) footerVersion.textContent = data.version;
    } catch (e) {
      console.error('Error loading version:', e);
    }
  })();

  // Load telemetry stats
  async function loadTelemetryStats() {
    try {
      const res = await fetch('/api/telemetry/stats');
      const data = await res.json();
      const activeInstances = document.getElementById('activeInstances');
      if (activeInstances && data.active_instances !== undefined) {
        activeInstances.textContent = data.active_instances;
      }
    } catch (e) {
      console.debug('Telemetry stats unavailable:', e);
      // Silently fail - télémétrie optionnelle
    }
  }

  // Charger au démarrage
  loadTelemetryStats();
  
  // Recharger toutes les 60 secondes
  setInterval(loadTelemetryStats, 60000);
</script>
