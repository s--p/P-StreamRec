<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recordings - P-StreamRec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="/static/loader.js"></script>
  <script defer src="/static/recordings.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="container">
    <!-- Stats bar -->
    <div class="recordings-stats" id="recordingsStats">
      <div class="stat-card">
        <div class="stat-value" id="totalRecordings">-</div>
        <div class="stat-label">Total Recordings</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalSize">-</div>
        <div class="stat-label">Total Size</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalModels">-</div>
        <div class="stat-label">Models</div>
      </div>
    </div>

    <!-- Model Cards Grid (default view) -->
    <div class="recordings-model-grid" id="modelGrid">
      <div class="empty-message" id="loadingState">
        <div class="icon">&#9203;</div>
        <p>Loading recordings...</p>
      </div>
    </div>

    <!-- Recording Detail View (shown when a model card is clicked) -->
    <div class="recordings-detail" id="recordingsDetail" style="display: none;">
      <div class="detail-header">
        <button class="back-btn" onclick="showModelGrid()">&#8592; Back to Models</button>
        <h2 class="detail-username" id="detailUsername">Model</h2>
        <span class="detail-count" id="detailCount">0 recordings</span>
        <button class="watch-btn record-btn" id="detailRecordBtn" onclick="toggleDetailAutoRecord()" style="margin-left: auto;">
          <span id="detailRecordIcon">&#9675;</span>
          <span id="detailRecordText">Auto-Record</span>
        </button>
      </div>
      <div class="recordings-list" id="recordingsList"></div>
    </div>

    <!-- Player Modal -->
    <div class="player-modal" id="playerModal" style="display: none;">
      <div class="player-modal-content">
        <div class="player-modal-header">
          <div class="player-modal-left-actions">
            <button class="back-btn" id="playerBackBtn" onclick="backToModelRecordings()">&#8592; Back to Recordings</button>
          </div>
          <h3 id="playerTitle">Playing</h3>
          <div class="player-modal-right-actions">
            <button class="rec-action-btn danger" id="playerDeleteBtn" onclick="deleteCurrentPlayingRecording()" title="Delete current recording">&#128465; Delete</button>
            <button class="player-close-btn" onclick="closePlayer()">&times;</button>
          </div>
        </div>
        <video id="recordingPlayer" class="recording-video" controls></video>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-message" id="emptyRecordings" style="display: none;">
      <div class="icon">&#127910;</div>
      <p>No recordings found</p>
    </div>
  </div>

  <div id="footer-placeholder"></div>
</body>
</html>
