<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discovery - P-StreamRec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #111432;
      --bg-card: #1a1f3a;
      --bg-card-hover: #232a4a;
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, #0d1128 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    /* Container */
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    /* Page Title */
    .page-title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    
    .page-subtitle {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    
    /* Filters */
    .filters {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-width: 150px;
    }
    
    .filter-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .filter-select {
      padding: 0.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .filter-select:hover {
      border-color: var(--accent);
    }
    
    .filter-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    
    .search-input {
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      flex: 1;
      min-width: 200px;
      transition: all 0.3s;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    
    .apply-filters-btn {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    
    .apply-filters-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }
    
    /* Stats */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .stat-icon {
      font-size: 1.5rem;
    }
    
    .stat-info {
      display: flex;
      flex-direction: column;
    }
    
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    /* Streams Grid */
    .streams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stream-card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid var(--border);
      position: relative;
    }
    
    .stream-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    
    .stream-thumbnail {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: linear-gradient(135deg, #1a1f3a 0%, #2d3356 100%);
    }
    
    .stream-info {
      padding: 1rem;
    }
    
    .stream-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 0.75rem;
    }
    
    .stream-username {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      max-width: 180px;
    }
    
    .stream-viewers {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: rgba(99, 102, 241, 0.1);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
    }
    
    .stream-subject {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.5rem;
    }
    
    .stream-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    
    .meta-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.15);
      color: var(--text-primary);
      border: 1px solid rgba(99, 102, 241, 0.3);
    }
    
    .stream-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    
    .btn-watch {
      flex: 1;
      padding: 0.6rem;
      background: linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.85rem;
    }
    
    .btn-watch:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    
    .btn-add {
      padding: 0.6rem 1rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.85rem;
    }
    
    .btn-add:hover {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }
    
    .badge-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(239, 68, 68, 0.9);
      backdrop-filter: blur(10px);
    }
    
    .badge-hd {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(99, 102, 241, 0.9);
      backdrop-filter: blur(10px);
    }
    
    .badge-new {
      position: absolute;
      top: 45px;
      left: 12px;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(16, 185, 129, 0.9);
      backdrop-filter: blur(10px);
    }
    
    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
    }
    
    .page-btn {
      padding: 0.75rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .page-btn:hover:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    .page-info {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    
    .loading-spinner {
      font-size: 3rem;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
  </style>
  <script src="/static/loader.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>
  
  <div class="container">
    <h1 class="page-title">🔍 Discovery</h1>
    <p class="page-subtitle">Explore live Chaturbate streams and discover new models</p>
    
    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label class="filter-label">Gender</label>
        <select class="filter-select" id="filterGender">
          <option value="">All</option>
          <option value="f">Female</option>
          <option value="m">Male</option>
          <option value="c">Couple</option>
          <option value="t">Trans</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label class="filter-label">Region</label>
        <select class="filter-select" id="filterRegion">
          <option value="">All Regions</option>
          <option value="north_america">North America</option>
          <option value="south_america">South America</option>
          <option value="europe">Europe</option>
          <option value="asia">Asia</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label class="filter-label">Tag</label>
        <select class="filter-select" id="filterTag">
          <option value="">All Tags</option>
        </select>
      </div>
      
      <div class="filter-group" style="flex: 1; min-width: 250px;">
        <label class="filter-label">Search Username</label>
        <input type="text" class="search-input" id="searchUsername" placeholder="Type username...">
      </div>
      
      <button class="apply-filters-btn" onclick="applyFilters()">Apply Filters</button>
    </div>
    
    <!-- Stats -->
    <div class="stats" id="statsContainer" style="display: none;">
      <div class="stat-card">
        <div class="stat-icon">🎥</div>
        <div class="stat-info">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Live Streams</div>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-info">
          <div class="stat-value" id="statViewers">0</div>
          <div class="stat-label">Total Viewers</div>
        </div>
      </div>
    </div>
    
    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="loading-spinner">⏳</div>
      <p>Loading streams...</p>
    </div>
    
    <!-- Streams Grid -->
    <div class="streams-grid" id="streamsGrid" style="display: none;"></div>
    
    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">🔍</div>
      <h3>No Streams Found</h3>
      <p>Try adjusting your filters</p>
    </div>
    
    <!-- Pagination -->
    <div class="pagination" id="paginationContainer" style="display: none;">
      <button class="page-btn" id="prevBtn" onclick="changePage(-1)">← Previous</button>
      <span class="page-info" id="pageInfo">Page 1 of 1</span>
      <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next →</button>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let currentFilters = {
      gender: '',
      region: '',
      tag: ''
    };
    let totalPages = 1;
    
    // Load tags on page load
    async function loadTags() {
      try {
        const res = await fetch('/api/discover/tags');
        const data = await res.json();
        
        const tagSelect = document.getElementById('filterTag');
        data.tags.forEach(tag => {
          const option = document.createElement('option');
          option.value = tag;
          option.textContent = tag;
          tagSelect.appendChild(option);
        });
      } catch (e) {
        console.error('Error loading tags:', e);
      }
    }
    
    // Load streams
    async function loadStreams() {
      const loadingState = document.getElementById('loadingState');
      const streamsGrid = document.getElementById('streamsGrid');
      const emptyState = document.getElementById('emptyState');
      const paginationContainer = document.getElementById('paginationContainer');
      const statsContainer = document.getElementById('statsContainer');
      
      loadingState.style.display = 'block';
      streamsGrid.style.display = 'none';
      emptyState.style.display = 'none';
      paginationContainer.style.display = 'none';
      statsContainer.style.display = 'none';
      
      try {
        const params = new URLSearchParams({
          page: currentPage,
          limit: 90
        });
        
        if (currentFilters.gender) params.append('gender', currentFilters.gender);
        if (currentFilters.region) params.append('region', currentFilters.region);
        if (currentFilters.tag) params.append('tag', currentFilters.tag);
        
        console.log('Fetching streams with params:', params.toString());
        
        const res = await fetch(`/api/discover/streams?${params}`);
        console.log('Response status:', res.status);
        
        const data = await res.json();
        console.log('Response data:', data);
        
        loadingState.style.display = 'none';
        
        if (data.error) {
          console.error('API Error:', data.error);
          document.getElementById('emptyState').innerHTML = `
            <div class="empty-state-icon">⚠️</div>
            <h3>Error Loading Streams</h3>
            <p>${data.error}</p>
            <button onclick="loadStreams()" style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;">Retry</button>
          `;
          emptyState.style.display = 'block';
          return;
        }
        
        if (data.streams && data.streams.length > 0) {
          console.log('Rendering', data.streams.length, 'streams');
          renderStreams(data.streams);
          streamsGrid.style.display = 'grid';
          
          // Update stats
          document.getElementById('statTotal').textContent = data.total || data.streams.length;
          const totalViewers = data.streams.reduce((sum, s) => sum + (s.viewers || 0), 0);
          document.getElementById('statViewers').textContent = totalViewers.toLocaleString();
          statsContainer.style.display = 'flex';
          
          // Update pagination
          totalPages = data.total_pages || 1;
          updatePagination();
          paginationContainer.style.display = 'flex';
        } else {
          console.warn('No streams found');
          document.getElementById('emptyState').innerHTML = `
            <div class="empty-state-icon">🔍</div>
            <h3>No Streams Found</h3>
            <p>Try adjusting your filters or check your internet connection</p>
            <button onclick="loadStreams()" style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;">Retry</button>
          `;
          emptyState.style.display = 'block';
        }
      } catch (e) {
        console.error('Error loading streams:', e);
        loadingState.style.display = 'none';
        document.getElementById('emptyState').innerHTML = `
          <div class="empty-state-icon">⚠️</div>
          <h3>Network Error</h3>
          <p>${e.message}</p>
          <p style="font-size: 0.85rem; margin-top: 0.5rem; color: var(--text-secondary);">Make sure the server is running and BeautifulSoup4 is installed</p>
          <button onclick="loadStreams()" style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;">Retry</button>
        `;
        emptyState.style.display = 'block';
      }
    }
    
    // Render streams
    function renderStreams(streams) {
      const grid = document.getElementById('streamsGrid');
      grid.innerHTML = '';
      
      // Filter by search if provided
      const searchTerm = document.getElementById('searchUsername').value.toLowerCase().trim();
      let filteredStreams = streams;
      
      if (searchTerm) {
        filteredStreams = streams.filter(s => 
          s.username.toLowerCase().includes(searchTerm)
        );
      }
      
      if (filteredStreams.length === 0) {
        grid.style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      
      filteredStreams.forEach(stream => {
        const card = document.createElement('div');
        card.className = 'stream-card';
        
        const genderIcon = {
          'female': '👩',
          'male': '👨',
          'couple': '👫',
          'trans': '🏳️‍⚧️'
        }[stream.gender] || '👤';
        
        card.innerHTML = `
          <div style="position: relative;">
            <img src="${stream.thumbnailUrl || stream.thumbnail}" 
                 alt="${stream.username}" 
                 class="stream-thumbnail"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22200%22%3E%3Crect fill=%22%231a1f3a%22 width=%22280%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23a0aec0%22 font-size=%2218%22%3E${stream.username}%3C/text%3E%3C/svg%3E'">
            ${stream.viewers ? `<div class="badge-overlay">🔴 LIVE</div>` : ''}
            ${stream.isHd ? `<div class="badge-hd">HD</div>` : ''}
            ${stream.isNew ? `<div class="badge-new">NEW</div>` : ''}
          </div>
          
          <div class="stream-info">
            <div class="stream-header">
              <div class="stream-username" title="${stream.username}">${stream.username}</div>
              ${stream.viewers ? `<div class="stream-viewers">👁️ ${stream.viewers.toLocaleString()}</div>` : ''}
            </div>
            
            ${stream.roomSubject ? `<div class="stream-subject">${escapeHtml(stream.roomSubject)}</div>` : '<div class="stream-subject" style="min-height: 2.5rem;"></div>'}
            
            <div class="stream-meta">
              ${stream.gender ? `<span class="meta-badge">${genderIcon} ${stream.gender}</span>` : ''}
              ${stream.age ? `<span class="meta-badge">🎂 ${stream.age}</span>` : ''}
              ${stream.location ? `<span class="meta-badge">📍 ${escapeHtml(stream.location)}</span>` : ''}
            </div>
            
            <div class="stream-actions">
              <button class="btn-watch" onclick="window.open('${stream.chatUrl}', '_blank')">
                👁️ Watch
              </button>
              <button class="btn-add" onclick="addStreamToModels('${stream.username}')" title="Add to my models">
                ➕
              </button>
            </div>
          </div>
        `;
        
        grid.appendChild(card);
      });
    }
    
    // Helper to escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Add stream to models
    async function addStreamToModels(username) {
      try {
        const res = await fetch('/api/models', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: username,
            autoRecord: true,
            recordQuality: 'best',
            retentionDays: 30
          })
        });
        
        if (res.ok) {
          alert(`✅ ${username} added to your models!`);
        } else if (res.status === 409) {
          alert(`⚠️ ${username} is already in your models.`);
        } else {
          alert('❌ Error adding model.');
        }
      } catch (e) {
        console.error('Error adding model:', e);
        alert('❌ Error adding model.');
      }
    }
    
    // Apply filters
    function applyFilters() {
      currentFilters.gender = document.getElementById('filterGender').value;
      currentFilters.region = document.getElementById('filterRegion').value;
      currentFilters.tag = document.getElementById('filterTag').value;
      currentPage = 1;
      loadStreams();
    }
    
    // Change page
    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        loadStreams();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }
    
    // Update pagination UI
    function updatePagination() {
      document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prevBtn').disabled = currentPage === 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    }
    
    // Search on Enter
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchUsername').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          applyFilters();
        }
      });
      
      loadTags();
      loadStreams();
    });
  </script>
  
  <div id="footer-placeholder"></div>
</body>
</html>
